<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gambar Kerja</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: #ffffff;
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }

        .header {
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            border-bottom: 2px solid #000000;
        }

        .logo-kemenaker, .logo-bbpvp {
            width: 75px;
            height: 75px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .header-text {
            flex-grow: 1;
            text-align: center; 
        }

        .header h1 {
            font-size: 18px;
            font-weight: bold;
            color: #000000;
            text-transform: uppercase;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .header h2 {
            font-size: 16px; 
            font-weight: bold;
            color: #000000;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .header h3 {
            font-size: 15px; 
            font-weight: bold;
            color: #000000;
            text-transform: uppercase;
        }

        .hero-section {
            width: 100%;
            height: 480px;
            background-image: url('https://images.unsplash.com/photo-1581094288338-2314dddb7ece?q=80&w=1200&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            border-bottom: 2px solid #000000;
        }

        .title-section {
            text-align: center;
            padding: 25px 10px 10px 10px;
        }

        .title-section h4 {
            font-size: 28px;
            font-weight: bold;
            color: #000000;
            display: inline-block;
            border-bottom: 4px solid #000000;
            padding-bottom: 5px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px 30px 50px 30px;
        }

        .content-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .weld-illustration-box {
            width: 100%;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            border: 2px solid #000000;
            border-radius: 6px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 15px;
        }

        .btn-desc {
            font-size: 14px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 10px;
            min-height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: underline;
        }

        .text-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .action-click {
            display: inline-block;
            background-color: #0056b3;
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s, transform 0.1s;
        }

        .action-click:hover {
            background-color: #003d82;
            transform: scale(1.05);
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .popup-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .popup-box {
            background-color: #ffffff;
            width: 95%;
            max-width: 750px;
            padding: 25px;
            border-radius: 8px;
            position: relative;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .popup-overlay.active .popup-box {
            transform: translateY(0);
        }

        .popup-close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #888888;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
        }

        .popup-close-btn:hover {
            color: #000000;
        }

        .popup-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #000000;
            text-align: left;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }

        .popup-body-image-container {
            width: 100%;
            max-height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            border: 1px solid #dddddd;
            margin-bottom: 20px;
            overflow: hidden;
            border-radius: 4px;
        }

        .popup-img-content {
            max-width: 100%;
            max-height: 450px;
            object-fit: contain;
        }

        .popup-nav-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid #e0e0e0;
            padding-top: 15px;
            width: 100%;
        }

        .nav-row-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
        }

        .nav-btn {
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            flex: 1;
        }

        .btn-prev {
            background-color: grey;
        }

        .btn-prev:hover {
            background-color: rgb(63, 62, 62); 
            transform: scale(1.02);
        }

        .btn-next {
            background-color: #0056b3;
        }

        .btn-next:hover {
            background-color: #003d82;
            transform: scale(1.02);
        }

        .nav-btn.close-style {
            background-color: #dc3545;
            color: #ffffff;
            border: 1px solid #dc3545;
            width: 100%;
            display: block;
        }
        
        .nav-btn.close-style:hover {
            background-color: #bd2130;
            color: #ffffff;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header class="header">
            <img src="Logo_Kementerian_Ketenagakerjaan_(2016).png" alt="Logo Kemenaker" class="logo-kemenaker">
            
            <div class="header-text">
                <h1>Kementerian Ketenagakerjaan Republik Indonesia</h1>
                <h2>SENTRA TERPADU INTEN SOEWONO</h2>
            </div>

            <img src="logomp42.png" alt="Logo BBPVP" class="logo-bbpvp">
        </header>

        <div class="hero-section"></div>

        <div class="title-section">
            <h4>Gambar Kerja</h4>
        </div>

        <main class="button-grid">
            
            <div class="content-card">
                <div class="weld-illustration-box">
                    <svg width="100" height="50" viewBox="0 0 100 50">
                        <rect x="10" y="30" width="80" height="10" fill="#a0a0a0" stroke="#333" stroke-width="1.5"/>
                        <path d="M15,30 Q20,20 25,30 Q30,20 35,30 Q40,20 45,30 Q50,20 55,30 Q60,20 65,30 Q70,20 75,30 Q80,20 85,30" fill="none" stroke="#555" stroke-width="2.5" />
                    </svg>
                </div>
                <div class="text-group">
                    <div class="btn-desc">Pengelasan Rigi - Rigi</div>
                    <button class="action-click" onclick="openPopup(0)">Klik Disini</button>
                </div>
            </div>

            <div class="content-card">
                <div class="weld-illustration-box">
                    <svg width="100" height="60" viewBox="0 0 100 60">
                        <g transform="rotate(45 50 30)">
                            <rect x="15" y="27" width="40" height="6" fill="#a0a0a0" stroke="#333" stroke-width="1.5"/>
                            <rect x="55" y="10" width="6" height="40" fill="#a0a0a0" stroke="#333" stroke-width="1.5"/>
                            <path d="M55,27 Q49,21 55,21 Q61,21 55,27" fill="#777" stroke="#333"/>
                        </g>
                    </svg>
                </div>
                <div class="text-group">
                    <div class="btn-desc">1F - Plat to Plat</div>
                    <button class="action-click" onclick="openPopup(1)">Klik Disini</button>
                </div>
            </div>

            <div class="content-card">
                <div class="weld-illustration-box">
                    <svg width="100" height="60" viewBox="0 0 100 60">
                        <rect x="15" y="40" width="70" height="8" fill="#a0a0a0" stroke="#333" stroke-width="1.5"/>
                        <rect x="46" y="10" width="8" height="30" fill="#a0a0a0" stroke="#333" stroke-width="1.5"/>
                        <path d="M46,40 Q40,33 46,33 Z" fill="#777" stroke="#333"/>
                        <path d="M54,40 Q60,33 54,33 Z" fill="#777" stroke="#333"/>
                    </svg>
                </div>
                <div class="text-group">
                    <div class="btn-desc">2F - Plat to Plat</div>
                    <button class="action-click" onclick="openPopup(2)">Klik Disini</button>
                </div>
            </div>

            <div class="content-card">
                <div class="weld-illustration-box">
                    <svg width="100" height="60" viewBox="0 0 100 60">
                        <g transform="rotate(90 50 30)">
                            <rect x="20" y="37" width="60" height="8" fill="#a0a0a0" stroke="#333" stroke-width="1.5"/>
                            <rect x="46" y="13" width="8" height="24" fill="#a0a0a0" stroke="#333" stroke-width="1.5"/>
                            <path d="M46,37 Q41,31 46,31 Z" fill="#777" stroke="#333"/>
                            <path d="M54,37 Q59,31 54,31 Z" fill="#777" stroke="#333"/>
                        </g>
                    </svg>
                </div>
                <div class="text-group">
                    <div class="btn-desc">3F - Plat to Plat</div>
                    <button class="action-click" onclick="openPopup(3)">Klik Disini</button>
                </div>
            </div>

        </main>
    </div>

    <div class="popup-overlay" id="popupOverlay">
        <div class="popup-box">
            <button class="popup-close-btn" onclick="closePopup()">&times;</button>
            
            <div class="popup-title" id="popupTitle">Detail Kerja: Latihan Rigi - Rigi</div>
            
            <div class="popup-body-image-container">
                <img src="" alt="Gambar Kerja" class="popup-img-content" id="popupImageContent">
            </div>
            
            <div class="popup-nav-container">
                <div class="nav-row-top">
                    <button class="nav-btn btn-prev" onclick="prevPopup()">Sebelumnya</button>
                    <button class="nav-btn btn-next" onclick="nextPopup()">Selanjutnya</button>
                </div>
                <button class="nav-btn close-style" onclick="closePopup()">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        const popupData = [
            {
                title: "Detail Kerja: Latihan Rigi - Rigi (JOB SHEET 1)",
                imagePath: "WhatsApp Image 2026-05-30 at 18.09.31.jpeg"
            },
            {
                title: "Detail Kerja: T - Joint (Fillet Weld ~ 1F) (JOB SHEET 2)",
                imagePath: "WhatsApp Image 2026-05-30 at 18.04.12.jpeg"
            },
            {
                title: "Detail Kerja: T - Joint (Fillet Weld ~ 2F) (JOB SHEET 3)",
                imagePath: "WhatsApp Image 2026-05-30 at 19.41.10.jpeg"
            },
            {
                title: "Detail Kerja: T - Joint (Fillet Weld ~ 3F) (JOB SHEET 4)",
                imagePath: "WhatsApp Image 2026-05-30 at 18.08.28.jpeg"
            }
        ];

        let currentIndex = 0;
        const overlay = document.getElementById('popupOverlay');
        const pTitle = document.getElementById('popupTitle');
        const pImage = document.getElementById('popupImageContent');

        function openPopup(index) {
            currentIndex = index;
            updatePopupContent();
            overlay.classList.add('active');
        }

        function closePopup() {
            overlay.classList.remove('active');
        }

        function updatePopupContent() {
            pTitle.innerText = popupData[currentIndex].title;
            pImage.src = popupData[currentIndex].imagePath;
            pImage.alt = popupData[currentIndex].title;
        }

        function prevPopup() {
            if (currentIndex > 0) {
                currentIndex--;
            } else {
                currentIndex = popupData.length - 1;
            }
            updatePopupContent();
        }

        function nextPopup() {
            if (currentIndex < popupData.length - 1) {
                currentIndex++;
            } else {
                currentIndex = 0;
            }
            updatePopupContent();
        }

        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) {
                closePopup();
            }
        });
    </script>
</body>
</html>
